<div class="card bg-base-200 hover:bg-base-300 transition-colors cursor-pointer"
     [class.opacity-50]="!canInvite"
     (click)="onInvite()">
  <div class="card-body p-3 flex-row items-center gap-3">
    <!-- Status indicator -->
    <div class="relative">
      <!-- Avatar placeholder -->
      <div class="avatar placeholder">
        <div class="bg-neutral text-neutral-content rounded-full w-10">
          <span>{{ player.name.charAt(0) }}</span>
        </div>
      </div>
      <!-- Online dot -->
      <span class="absolute bottom-0 right-0 w-3 h-3 bg-success rounded-full border-2 border-base-200"></span>
    </div>

    <!-- Player info -->
    <div class="flex-1 min-w-0">
      <h4 class="font-medium truncate">{{ player.name }}</h4>
    </div>

    <!-- Action button -->
    <button
      class="btn btn-primary btn-sm"
      [disabled]="!canInvite"
      (click)="onInvite(); $event.stopPropagation()">
      Défier
    </button>
  </div>
</div>
