<div class="card bg-base-100 transition-colors cursor-pointer"
     [class.opacity-50]="!canInvite"
     (click)="onInvite()">
  <div class="card-body p-3 flex-row items-center gap-3">
    <!-- Avatar MMII -->
    <div class="relative">
      @if (player.mmii) {
        <div [style.background-image]="'url(\'' + assetsService.getBgUrl(player.mmii.background) + '\')'"
             class="bg-cover rounded-full w-14 h-14">
          <div class="rounded-full overflow-hidden backdrop-blur-sm p-0.5 pb-0 pt-1 flex justify-center items-center w-full h-full">
            <app-mmii size="3rem" [mmiiShapes]="player.mmii.shape"></app-mmii>
          </div>
        </div>
      } @else {
        <div class="avatar placeholder">
          <div class="bg-neutral text-neutral-content rounded-full w-10">
            <span>{{ player.name.charAt(0) }}</span>
          </div>
        </div>
      }
    </div>

    <!-- Player info -->
    <div class="flex-1 min-w-0">
      <h6 class="font-medium truncate">{{ player.name }}</h6>
    </div>

    <!-- Action button -->
    <button
      class="btn btn-primary btn-sm"
      [disabled]="!canInvite"
      (click)="onInvite(); $event.stopPropagation()">
      Défier
    </button>
  </div>
</div>
