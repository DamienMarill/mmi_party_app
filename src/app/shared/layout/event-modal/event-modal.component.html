@if (current) {
  <div class="event-modal-overlay"
       [class.visible]="visible"
       (click)="dismiss()">
    <div class="event-modal-content" (click)="$event.stopPropagation()">
      <div class="flex flex-col items-center gap-4">
        <h2 class="text-xl font-bold text-center">Carte promo debloquee !</h2>

        <div class="card relative overflow-hidden w-64 border-4 border-rarity-epic shadow-rarity-epic epic-reveal">
          @if (current.card_version.image) {
            <img class="rounded-t-2xl" [src]="assetsService.getCardTemplateUrl(current.card_version.image)" alt="Promo card">
          } @else {
            <div class="aspect-square bg-base-300 rounded-t-2xl flex items-center justify-center">
              <app-mmii size="10rem" [mmiiShapes]="current.card_version.card_template?.mmii?.shape"></app-mmii>
            </div>
          }
          <div class="card-body p-3">
            <p class="text-sm text-center font-semibold">{{ current.card_version.card_template?.name }}</p>
          </div>
        </div>

        <button class="btn btn-primary btn-sm" (click)="dismiss()">Super !</button>
      </div>
    </div>
  </div>
}
