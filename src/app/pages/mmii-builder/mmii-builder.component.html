<div class="builder-container">
  <h1 class="text-4xl font-bold mb-6 text-center">🛠️ MMII Builder</h1>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- Colonne gauche : Éditeur -->
    <div class="space-y-4">
      <div class="card bg-base-100 shadow-md">
        <div class="card-body">
          <h1 class="card-title text-lg">Nom du personnage</h1>
          <app-input [label]="'Nom'" [(ngModel)]="name"></app-input>
        </div>
      </div>

      <div class="card bg-base-100 shadow-md">
        <div class="card-body">
          <h2 class="card-title text-lg">Apparence</h2>
          <app-mmii-editor (mmiiShapeChange)="shapes = $event"></app-mmii-editor>
        </div>
      </div>

      <div class="card bg-base-100 shadow-md">
        <div class="card-body">
          <h2 class="card-title text-lg">Background</h2>
          
          <app-edit-bg (backgroundChange)="background = $event"></app-edit-bg>
        </div>
      </div>
    </div>

    <!-- Colonne droite : Preview + JSON -->
    <div class="space-y-4">
      <!-- Preview -->
      <div class="card bg-base-100 shadow-md">
        <div class="card-body items-center">
          <h2 class="card-title text-lg">Aperçu</h2>
          @if (shapes) {
            <div class="preview-card w-48 rounded-2xl overflow-hidden border-4 border-primary shadow-lg">
              <div [style.background-image]="'url(' + assetsService.getBgUrl(background) + ')'"
                   class="bg-cover aspect-square flex justify-center items-end">
                <div class="backdrop-blur-sm w-full h-full p-4 pb-0 flex justify-center items-end">
                  <app-mmii size="10rem" [mmiiShapes]="shapes"></app-mmii>
                </div>
              </div>
              <div class="bg-base-100 p-2 text-center">
                <p class="text-sm font-medium">{{ name || '...' }}</p>
              </div>
            </div>
          } @else {
            <div class="w-48 aspect-square bg-base-300 rounded-2xl flex items-center justify-center opacity-50">
              <span class="text-4xl">🎨</span>
            </div>
          }
        </div>
      </div>

      <!-- JSON Output -->
      <div class="card bg-base-100 shadow-md">
        <div class="card-body">
          <div class="flex justify-between items-center">
            <h2 class="card-title text-lg">JSON</h2>
            <button class="btn btn-sm"
                    [ngClass]="copied ? 'btn-success' : 'btn-primary'"
                    (click)="copyJson()">
              @if (copied) {
                ✅ Copié !
              } @else {
                📋 Copier
              }
            </button>
          </div>
          <textarea
            class="textarea textarea-bordered w-full font-mono text-xs"
            [value]="getJson()"
            readonly
            rows="16">
          </textarea>
        </div>
      </div>
    </div>
  </div>
</div>
