<div class="min-h-screen p-4">
  <!-- Loading -->
  <div *ngIf="isLoading" class="flex justify-center items-center pt-40">
    <span class="loading loading-spinner loading-lg"></span>
  </div>

  <!-- Hub Content -->
  <div *ngIf="!isLoading && currentUserId" class="max-w-2xl mx-auto pt-10">
    <header class="mb-8 text-center">
      <h1 class="text-3xl font-bold mb-2">🔄 Zone d'Échange</h1>
      <p class="text-base-content/70">Échange des cartes avec d'autres joueurs !</p>
      
      <!-- Connection status -->
      <div class="mt-4 inline-flex items-center gap-2">
        <span 
          class="w-3 h-3 rounded-full"
          [class.bg-success]="isConnected"
          [class.bg-error]="!isConnected">
        </span>
        <span class="text-sm text-base-content/60">
          {{ isConnected ? 'Connecté au serveur' : 'Connexion en cours...' }}
        </span>
      </div>
    </header>

    <!-- Hub Component -->
    <app-hub
      [hubType]="'trade'"
      [currentUserId]="currentUserId"
      (roomCreated)="onRoomCreated($event)">
    </app-hub>
  </div>
</div>
