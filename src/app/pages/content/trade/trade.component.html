@if (isLoading) {
  <div class="h-[calc(100vh-64px)] flex items-center justify-center">
    <span class="loading loading-spinner text-primary loading-lg"></span>
  </div>
} @else if (!isConnected) {
  <div class="h-[calc(100vh-64px)] flex flex-col items-center justify-center text-center p-4">
    <div class="alert alert-warning shadow-lg font-bold mb-4">
      <span>⚠️ Connexion au Hub perdue. Tentative de reconnexion...</span>
    </div>
    <span class="loading loading-spinner text-primary loading-lg"></span>
  </div>
} @else if (currentUserId) {
  <app-hub
    [hubType]="'trade'"
    [currentUserId]="currentUserId"
    (roomCreated)="onRoomCreated($event)">
  </app-hub>
}
